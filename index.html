<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Original Rogue Game</title>
  <style>
    body { display:flex; justify-content:center; align-items:center; height:100vh; margin:0; background:#f0f0f0; }
    canvas { background:#fff; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    #error-overlay {
      display: none;
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      max-height: 45vh;
      overflow: auto;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      font-size: 12px;
      z-index: 999999;
      padding: 8px;
      box-sizing: border-box;
      white-space: pre-wrap;
      font-family: monospace;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="320" height="320"></canvas>

  <div id="error-overlay"></div>

  <script>
    (function() {
      const overlay = document.getElementById('error-overlay');

      function appendError(msg) {
        overlay.style.display = 'block';
        overlay.textContent += msg + '\n\n';
      }

      window.addEventListener('error', function(event) {
        let msg = 'Error: ' + event.message;
        if (event.filename) {
          msg += '\nFile: ' + event.filename + ' Line: ' + event.lineno + ' Col: ' + event.colno;
        }
        if (event.error && event.error.stack) {
          msg += '\nStack: ' + event.error.stack;
        }
        appendError(msg);
      });

      window.addEventListener('unhandledrejection', function(event) {
        let msg = 'Unhandled Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown reason');
        if (event.reason && event.reason.stack) {
          msg += '\nStack: ' + event.reason.stack;
        }
        appendError(msg);
      });
    })();
  </script>

  <script src="game.js?v=fix001"></script>
</body>
</html>
